name: Build Android Debug APK

# Build non signé, keystore debug par défaut (aucune config à faire).
# Sert uniquement à tester que l'app fonctionne sur un vrai appareil Android.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le projet natif Android (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Compiler l'APK debug
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publier l'APK en artifact
        uses: actions/upload-artifact@v4
        with:
          name: idealy-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
