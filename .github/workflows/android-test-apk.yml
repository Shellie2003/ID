name: Build Android Debug APK

# Build non signé, keystore debug par défaut (aucune config à faire).
# Sert uniquement à tester que l'app fonctionne sur un vrai appareil Android.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v5

      - name: Installer Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Installer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le projet natif Android (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Compiler l'APK debug
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publier l'APK en artifact
        uses: actions/upload-artifact@v5
        with:
          name: idealy-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
