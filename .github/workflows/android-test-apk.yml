name: Build Android Test APK

# Variant "release" mais signé automatiquement avec le keystore debug généré par
# Android (aucune config de keystore à faire). On évite le variant "debug" car
# expo-dev-client y injecte l'écran "Development build" qui attend un serveur
# Metro au lieu de lancer l'app directement.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v5

      - name: Installer Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Installer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le projet natif Android (expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Compiler l'APK (variant release, signé avec le keystore debug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Publier l'APK en artifact
        uses: actions/upload-artifact@v5
        with:
          name: idealy-test-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
